model:
  name_or_path: "../models/google/gemma-3-270m-it"
  torch_dtype: "bfloat16"   # bf16 必需：fp16 在此模型上 loss=0/grad_norm=NaN

lora:
  rank: 8
  alpha: 16
  dropout: 0.1
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
  bias: "none"

training:
  train_data: "../logo-detailed-prompt/train.jsonl"
  valid_data: "../logo-detailed-prompt/valid.jsonl"
  output_dir: "../adapter"
  batch_size: 1
  gradient_accumulation_steps: 8   # 等效 batch size = 8
  learning_rate: 1.5e-4
  num_train_epochs: 3
  max_length: 1536                 # 超长 SVG 跳过，绝不截断（保留 89% 样本）
  logging_steps: 5
  eval_steps: 25
  save_steps: 25
  early_stopping_patience: 3
  weight_decay: 0.01
  warmup_ratio: 0.1
  gradient_checkpointing: true
  bf16: true

generation:
  max_new_tokens: 1024   # 多数目标 SVG 超 512 tokens，512 必然不完整
  temperature: 0.2       # 低温：smoke test 证实 temp=0.3 触发 "L 18 L 18..." 重复死循环
  top_p: 0.9
  repetition_penalty: 1.05   # 低 penalty：SVG 合法大量重复，高 penalty 逼出垃圾 token
  do_sample: true
  # NOTE: 不使用 no_repeat_ngram_size —— SVG 合法地大量重复（许多 <circle>），
  # 禁重复只会逼出损坏属性。
